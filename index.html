<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CLOYZES · WEB ADAPTER</title>
  <!-- Идеальные иконки (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Современный шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #1e1004 0%, #0b0703 100%);
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      position: relative;
      color: #fff;
    }

    /* Декоративные фоновые элементы — оранжевое свечение */
    body::before {
      content: "";
      position: fixed;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background: radial-gradient(circle at 50% 50%, rgba(255, 100, 0, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: subtlePulse 10s infinite alternate;
    }

    @keyframes subtlePulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.02); }
    }

    .adapter-wrapper {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 5;
      backdrop-filter: blur(2px);
    }

    /* ЗАГОЛОВОК */
    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    .glitch-title {
      font-weight: 800;
      font-size: clamp(2.4rem, 12vw, 4.8rem);
      letter-spacing: -0.02em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #ffb87c 45%, #ff7b00 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(255, 100, 0, 0.6);
      margin-bottom: 8px;
      animation: titleGlow 3s infinite alternate;
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 20px rgba(255, 120, 0, 0.5); }
      100% { text-shadow: 0 0 45px rgba(255, 80, 0, 0.9), 0 0 10px #ff5e00; }
    }

    .sub-line {
      height: 3px;
      width: 120px;
      margin: 10px auto 0;
      background: linear-gradient(90deg, transparent, #ff8c00, #ff3c00, #ff8c00, transparent);
      border-radius: 100px;
      box-shadow: 0 0 15px #ff6200;
    }

    /* СЕТКА КАРТОЧЕК — идеально видна на всех устройствах */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      align-items: stretch;
      justify-content: center;
    }

    /* КАРТОЧКА — чёрно-оранжевый градиент, стекло */
    .card {
      background: rgba(8, 6, 4, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 120, 0, 0.25);
      border-radius: 36px;
      padding: 28px 16px 26px;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 100, 0, 0.1) inset, 0 8px 0 0 rgba(0, 0, 0, 0.3);
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      transform: translateY(0);
    }

    /* Анимированная оранжевая подсветка границ */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 36px;
      padding: 2px;
      background: linear-gradient(145deg, #ff8c00, #ff3c00, #ffae00);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.45s ease;
      pointer-events: none;
    }

    .card:hover::after {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: 0 30px 50px -8px #000000dd, 0 0 30px rgba(255, 100, 0, 0.5), 0 8px 0 0 #1f1308;
      border-color: rgba(255, 140, 0, 0.6);
      background: rgba(12, 8, 5, 0.8);
      backdrop-filter: blur(18px);
    }

    /* ИКОНКА — уникальный стиль */
    .icon-wrapper {
      width: 90px;
      height: 90px;
      background: linear-gradient(145deg, #1e130b, #0d0906);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      border: 1.5px solid #ff7b0040;
      box-shadow: 0 12px 0 #0a0603, 0 8px 20px #00000080, inset 0 2px 4px rgba(255, 180, 80, 0.3);
      transition: all 0.3s ease;
      position: relative;
    }

    .card:hover .icon-wrapper {
      border-color: #ff9900;
      box-shadow: 0 10px 0 #0f0904, 0 15px 30px #000, inset 0 0 20px #ff8c0066;
      transform: scale(1.02);
    }

    .icon-wrapper i {
      font-size: 48px;
      color: #fff;
      text-shadow: 0 0 20px #ff8c00, 0 4px 8px #00000080;
      background: linear-gradient(135deg, #fff8e7, #ffc285);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      transition: 0.2s;
    }

    /* уникальные оттенки для каждой иконки (лёгкий акцент) */
    .card:nth-child(1) .icon-wrapper i { text-shadow: 0 0 25px #ff7300, 0 4px 8px black; }
    .card:nth-child(2) .icon-wrapper i { text-shadow: 0 0 25px #ff9f2e, 0 4px 8px black; }
    .card:nth-child(3) .icon-wrapper i { text-shadow: 0 0 25px #ff5e00, 0 4px 8px black; }
    .card:nth-child(4) .icon-wrapper i { text-shadow: 0 0 25px #ffaa33, 0 4px 8px black; }

    /* Текст карточки */
    .card h3 {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      color: #fff4e6;
      text-shadow: 0 2px 5px #00000080;
    }

    .card .badge {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffb27a;
      margin-bottom: 22px;
      opacity: 0.9;
    }

    /* КНОПКА — открывает ссылку, градиент чёрно-оранжевый */
    .card-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(145deg, #ff7b00, #e65100);
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      width: 100%;
      max-width: 180px;
      margin-top: auto;
      font-weight: 700;
      font-size: 1.1rem;
      color: #0c0704;
      text-decoration: none;
      box-shadow: 0 12px 0 #4a1e00, 0 5px 15px #00000080, 0 0 15px #ff7b0040;
      transition: all 0.2s ease;
      border: 1px solid #ffb45b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transform: translateY(0);
    }

    .card-btn i {
      font-size: 1rem;
      color: #0c0704;
      text-shadow: none;
      transition: transform 0.2s;
    }

    .card-btn:hover {
      background: linear-gradient(145deg, #ff9a2e, #ff5e00);
      box-shadow: 0 8px 0 #3d1700, 0 10px 25px #000, 0 0 25px #ff8c00;
      transform: translateY(4px);
      color: #000;
      border-color: #ffd29e;
    }

    .card-btn:hover i {
      transform: translateX(5px);
    }

    .card-btn:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #2e1000, 0 8px 20px black;
    }

    /* адаптив — на телефоне все 4 карточки видны разом (сетка 2x2) */
    @media screen and (max-width: 780px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }
      .card {
        padding: 22px 12px 20px;
        border-radius: 32px;
      }
      .icon-wrapper {
        width: 75px;
        height: 75px;
        border-radius: 24px;
      }
      .icon-wrapper i {
        font-size: 40px;
      }
      .card h3 {
        font-size: 1.4rem;
      }
      .card-btn {
        padding: 12px 10px;
        font-size: 1rem;
        max-width: 160px;
      }
    }

    /* очень маленькие экраны — всё равно все карточки видны (не скрываются) */
    @media screen and (max-width: 480px) {
      body {
        padding: 16px 10px;
        align-items: flex-start;  /* чтобы не резалось сверху */
      }
      .adapter-wrapper {
        margin: 10px 0;
      }
      .header {
        margin-bottom: 25px;
      }
      .glitch-title {
        font-size: 2rem;
      }
      .card-grid {
        gap: 14px;
      }
      .card {
        padding: 18px 8px 16px;
        border-radius: 28px;
      }
      .icon-wrapper {
        width: 65px;
        height: 65px;
        border-radius: 20px;
        margin-bottom: 14px;
      }
      .icon-wrapper i {
        font-size: 34px;
      }
      .card h3 {
        font-size: 1.2rem;
      }
      .badge {
        font-size: 0.7rem;
        margin-bottom: 14px;
      }
      .card-btn {
        padding: 10px 6px;
        font-size: 0.9rem;
        max-width: 140px;
        box-shadow: 0 8px 0 #4a1e00, 0 5px 12px black;
      }
      .card-btn:hover {
        transform: translateY(3px);
        box-shadow: 0 5px 0 #3d1700, 0 8px 20px black;
      }
    }

    /* для очень узких (320px) - гарантия видимости */
    @media screen and (max-width: 360px) {
      .card h3 {
        font-size: 1.1rem;
      }
      .icon-wrapper {
        width: 58px;
        height: 58px;
      }
      .icon-wrapper i {
        font-size: 30px;
      }
    }

    /* анимации появления */
    .card {
      animation: cardAppear 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.25s; }
    .card:nth-child(4) { animation-delay: 0.35s; }

    @keyframes cardAppear {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* плавное мерцание фона */
    .card .icon-wrapper::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: radial-gradient(circle at 30% 20%, rgba(255, 140, 0, 0.3), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .card:hover .icon-wrapper::before {
      opacity: 1;
    }

    /* небольшой footer / декоративная надпись (не обязательно) */
    .hint {
      margin-top: 32px;
      text-align: center;
      color: #ffc8a2;
      opacity: 0.6;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
